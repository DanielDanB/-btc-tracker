<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BTC"/>
  <meta name="theme-color" content="#000000"/>
  <title>Bitcoin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
      --sl:env(safe-area-inset-left);--sr:env(safe-area-inset-right);
      --btc:#FF9F0A;--green:#30D158;--red:#FF453A;
    }
    html{height:-webkit-fill-available}
    body{
      font-family:'Inter',-apple-system,sans-serif;
      min-height:100vh;min-height:-webkit-fill-available;
      display:flex;flex-direction:column;align-items:center;
      padding:calc(var(--st) + 20px) calc(var(--sr) + 18px) calc(var(--sb) + 20px) calc(var(--sl) + 18px);
      -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
      overflow-x:hidden;position:relative;
      background:radial-gradient(ellipse at 20% 10%,#1a0a2e 0%,transparent 50%),
                 radial-gradient(ellipse at 80% 20%,#0d1f3c 0%,transparent 50%),
                 radial-gradient(ellipse at 50% 80%,#1a1a0a 0%,transparent 60%),#050508;
      color:#fff;
    }
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite}
    .orb1{width:350px;height:350px;background:radial-gradient(circle,rgba(255,159,10,0.18),transparent 70%);top:-80px;left:-80px;animation-delay:0s}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(10,132,255,0.12),transparent 70%);top:30%;right:-60px;animation-delay:-4s}
    .orb3{width:250px;height:250px;background:radial-gradient(circle,rgba(48,209,88,0.08),transparent 70%);bottom:10%;left:20%;animation-delay:-8s}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(15px,-20px) scale(1.05)}66%{transform:translate(-10px,15px) scale(0.95)}}
    .wrap{position:relative;z-index:1;width:100%;max-width:390px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:4px}
    .hdr-l{display:flex;align-items:center;gap:11px}
    .btc-ball{
      width:48px;height:48px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,rgba(255,210,100,0.9),rgba(255,159,10,0.7) 50%,rgba(180,80,0,0.5));
      box-shadow:0 0 0 0.5px rgba(255,255,255,0.3),0 0 30px rgba(255,159,10,0.4),inset 0 1px 1px rgba(255,255,255,0.5),inset 0 -2px 6px rgba(0,0,0,0.3);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.4);flex-shrink:0;
    }
    .hdr-t h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
    .hdr-t p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
    .pill{
      display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
      color:var(--green);padding:5px 12px;border-radius:99px;
      background:rgba(48,209,88,0.12);border:0.5px solid rgba(48,209,88,0.3);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .pill::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .glass{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
      border:0.5px solid rgba(255,255,255,0.15);border-radius:28px;
      padding:26px 22px 22px;margin-bottom:12px;position:relative;overflow:hidden;
      box-shadow:0 0 0 0.5px rgba(255,255,255,0.05) inset,0 20px 60px rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.1) inset;
    }
    .glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)}
    .glass::after{content:'';position:absolute;top:-60px;left:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.04),transparent 70%);pointer-events:none}
    .clabel{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
    .price-tap{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
    .price-tap:active{opacity:.7}
    .tap-hint{font-size:10px;color:rgba(255,255,255,.2);margin-top:6px;display:flex;align-items:center;gap:4px}
    .tap-hint svg{opacity:.4}
    .usd-price{font-size:54px;font-weight:800;letter-spacing:-3px;line-height:1;color:#fff;display:flex;align-items:baseline;gap:4px}
    .usd-sym{font-size:26px;font-weight:400;color:rgba(255,255,255,.5);letter-spacing:0}
    .czk-glass{
      background:rgba(255,255,255,0.05);border:0.5px solid rgba(255,255,255,0.1);
      border-radius:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
      margin-top:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s;
    }
    .czk-glass:active{background:rgba(255,255,255,0.1)}
    .czk-l{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .czk-v{font-size:22px;font-weight:700;display:flex;align-items:baseline;gap:4px}
    .czk-s{font-size:13px;font-weight:400;color:rgba(255,255,255,.4)}
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:99px;margin-top:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .badge.up{background:rgba(48,209,88,0.12);color:var(--green);border:0.5px solid rgba(48,209,88,0.25)}
    .badge.dn{background:rgba(255,69,58,0.12);color:var(--red);border:0.5px solid rgba(255,69,58,0.25)}
    .badge svg{width:12px;height:12px}
    .div{height:0.5px;background:rgba(255,255,255,0.08);margin:18px 0}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat{background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:13px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .sl{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px}
    .sv{font-size:15px;font-weight:700}
    .chart-view{display:none;flex-direction:column;width:100%}
    .chart-view.show{display:flex}
    .back-btn{
      display:flex;align-items:center;gap:6px;
      background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.12);
      border-radius:12px;padding:8px 14px;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;
      cursor:pointer;-webkit-tap-highlight-color:transparent;margin-bottom:16px;align-self:flex-start;
      font-family:inherit;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:background .15s;
    }
    .back-btn:active{background:rgba(255,255,255,0.14)}
    .chart-glass{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);
      border:0.5px solid rgba(255,255,255,0.15);border-radius:28px;
      padding:22px 18px 18px;position:relative;overflow:hidden;
      box-shadow:0 0 0 0.5px rgba(255,255,255,0.05) inset,0 20px 60px rgba(0,0,0,0.4);
    }
    .chart-glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)}
    .chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
    .chart-price-big{font-size:32px;font-weight:800;letter-spacing:-1.5px}
    .chart-change{font-size:13px;font-weight:600;margin-top:3px}
    .chart-change.up{color:var(--green)}
    .chart-change.dn{color:var(--red)}
    .periods{display:flex;gap:4px;background:rgba(255,255,255,0.05);border-radius:12px;padding:3px}
    .period{padding:5px 10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.45);transition:all .2s;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit}
    .period.active{background:rgba(255,255,255,0.12);color:#fff;box-shadow:0 0 0 0.5px rgba(255,255,255,.1)}
    .canvas-wrap{position:relative;margin-top:12px;height:200px}
    canvas{width:100%;height:100%;display:block}
    .tooltip{position:absolute;top:0;pointer-events:none;background:rgba(20,20,35,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:6px 10px;font-size:11px;font-weight:600;white-space:nowrap;transform:translateX(-50%);display:none}
    .chart-loading{height:200px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:13px}
    .ts{text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:14px}
    .src{text-align:center;font-size:10px;color:rgba(255,255,255,.15);margin-top:3px;letter-spacing:.3px}
    .ver{text-align:center;font-size:10px;color:rgba(255,255,255,.1);margin-top:6px;letter-spacing:.5px}
    .sk{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:sh 1.4s ease-in-out infinite;border-radius:10px;color:transparent!important;user-select:none;display:inline-block}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-l">
      <div class="btc-ball">₿</div>
      <div class="hdr-t"><h1>Bitcoin</h1><p>Aktuální cena</p></div>
    </div>
    <div class="pill">Živě</div>
  </div>

  <!-- PRICE VIEW -->
  <div id="priceView">
    <div class="glass">
      <div class="clabel">Cena</div>
      <div class="price-tap" onclick="openChart('usd')">
        <div class="usd-price">
          <span class="usd-sym">$</span>
          <span id="usd" class="sk" style="width:200px;height:50px"> </span>
        </div>
        <div class="tap-hint">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Klepněte pro graf
        </div>
      </div>
      <div class="czk-glass" onclick="openChart('czk')">
        <span class="czk-l">CZK</span>
        <div class="czk-v">
          <span id="czk" class="sk" style="width:140px;height:22px"> </span>
          <span class="czk-s">Kč</span>
        </div>
      </div>
      <div id="badge" class="badge up sk" style="width:140px;height:32px"> </div>
      <div class="div"></div>
      <div class="stats">
        <div class="stat"><div class="sl">24H HIGH</div><div class="sv" id="s1">…</div></div>
        <div class="stat"><div class="sl">24H LOW</div><div class="sv" id="s2">…</div></div>
        <div class="stat"><div class="sl">TRŽNÍ CAP</div><div class="sv" id="s3">…</div></div>
        <div class="stat"><div class="sl">OBJEM 24H</div><div class="sv" id="s4">…</div></div>
      </div>
    </div>
    <div class="ts" id="ts">Připojuji se…</div>
    <div class="src" id="src"></div>
    <div class="ver">v1.0</div>
  </div>

  <!-- CHART VIEW -->
  <div class="chart-view" id="chartView">
    <button class="back-btn" onclick="closeChart()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Zpět
    </button>
    <div class="chart-glass">
      <div class="chart-header">
        <div>
          <div class="clabel" id="chartCurrency">USD</div>
          <div class="chart-price-big" id="chartPrice">–</div>
          <div class="chart-change" id="chartChange"></div>
        </div>
        <div class="periods">
          <button class="period active" onclick="setPeriod('1',this)">1D</button>
          <button class="period" onclick="setPeriod('7',this)">7D</button>
          <button class="period" onclick="setPeriod('30',this)">1M</button>
          <button class="period" onclick="setPeriod('365',this)">1R</button>
        </div>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="chart-loading" id="chartLoading">Načítám graf…</div>
        <canvas id="chartCanvas" style="display:none"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
    </div>
    <div class="ts" id="chartTs"></div>
    <div class="ver">v1.0</div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=0)=>new Intl.NumberFormat('cs-CZ',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtB=n=>n>=1e12?(n/1e12).toFixed(2)+' bil.':n>=1e9?(n/1e9).toFixed(2)+' mld.':n>=1e6?(n/1e6).toFixed(1)+' mil.':fmt(n);
const pct=n=>(n>=0?'+':'')+parseFloat(n).toFixed(2)+'%';

let currentUSD=0, currentCZK=0, fxRate=1;
let chartMode='usd', chartDays='1', chartData=[];
let ws=null, wsReady=false;

/* ── FX kurz USD/CZK ── */
async function loadFX(){
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=CZK');
    const j=await r.json();
    fxRate=j.rates.CZK;
  }catch(e){ fxRate=23.5; } // fallback
}

/* ── WebSocket Binance — funguje všude včetně iOS PWA ── */
function connectWS(){
  if(ws){ try{ws.close()}catch(e){} }
  ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');

  ws.onopen=()=>{
    wsReady=true;
    $('ts').textContent='Připojeno · čekám na data…';
  };

  ws.onmessage=e=>{
    try{
      const d=JSON.parse(e.data);
      currentUSD=parseFloat(d.c);       // current price
      currentCZK=currentUSD*fxRate;
      const ch=parseFloat(d.P);         // 24h % change
      const hi=parseFloat(d.h);
      const lo=parseFloat(d.l);
      const vol=parseFloat(d.q);        // quote volume USD
      const cap=currentUSD*19700000;

      const uel=$('usd'),cel=$('czk'),bad=$('badge');
      uel.className='';uel.style='';uel.textContent=fmt(currentUSD);
      cel.className='';cel.style='';cel.textContent=fmt(currentCZK);
      bad.className='badge '+(ch>=0?'up':'dn');bad.style='';
      bad.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="${ch>=0?'M5 15l7-7 7 7':'M19 9l-7 7-7-7'}"/></svg>${pct(ch)} za 24h`;

      $('s1').textContent='$'+fmt(hi);
      $('s2').textContent='$'+fmt(lo);
      $('s3').textContent='$'+fmtB(cap);
      $('s4').textContent='$'+fmtB(vol);

      const now=new Date();
      $('ts').textContent='Živě · '+now.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      $('src').textContent='Zdroj: Binance WebSocket';
    }catch(err){ console.error(err); }
  };

  ws.onerror=()=>{
    wsReady=false;
    $('ts').textContent='Chyba spojení — zkouším znovu…';
    setTimeout(connectWS, 3000);
  };

  ws.onclose=()=>{
    wsReady=false;
    // Automatické znovupřipojení po 5s
    setTimeout(connectWS, 5000);
  };
}

/* ── Graf: CoinGecko historická data ── */
function openChart(mode){
  chartMode=mode; chartDays='1';
  $('priceView').style.display='none';
  $('chartView').classList.add('show');
  document.querySelectorAll('.period').forEach((b,i)=>b.classList.toggle('active',i===0));
  $('chartCurrency').textContent=mode==='usd'?'USD':'CZK';
  $('chartPrice').textContent=(mode==='usd'?'$':'')+fmt(mode==='usd'?currentUSD:currentCZK)+(mode==='czk'?' Kč':'');
  loadChart();
}
function closeChart(){
  $('chartView').classList.remove('show');
  $('priceView').style.display='';
}
function setPeriod(days,btn){
  chartDays=days;
  document.querySelectorAll('.period').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadChart();
}

async function loadChart(){
  $('chartCanvas').style.display='none';
  $('chartLoading').style.display='flex';
  $('chartLoading').textContent='Načítám graf…';
  try{
    const interval=chartDays==='1'?'hourly':'daily';
    const r=await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${chartDays}&interval=${interval}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data=await r.json();
    chartData=data.prices.map(p=>({t:p[0],v:chartMode==='czk'?p[1]*fxRate:p[1]}));
    const mn=Math.min(...chartData.map(d=>d.v));
    const mx=Math.max(...chartData.map(d=>d.v));
    const first=chartData[0].v,last=chartData[chartData.length-1].v;
    const chg=((last-first)/first)*100;
    const isUp=chg>=0;
    $('chartChange').textContent=pct(chg)+' · '+({1:'1 den',7:'7 dní',30:'30 dní',365:'1 rok'}[chartDays]);
    $('chartChange').className='chart-change '+(isUp?'up':'dn');
    drawChart(isUp,mn,mx);
    $('chartLoading').style.display='none';
    $('chartCanvas').style.display='block';
    $('chartTs').textContent='Graf: CoinGecko · '+new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    $('chartLoading').innerHTML='<span style="color:var(--red)">⚠ Chyba načítání grafu</span>';
    console.error(e);
  }
}

function drawChart(isUp,mn,mx){
  const canvas=$('chartCanvas');
  const wrap=$('canvasWrap');
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth,H=200;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const pad={t:10,r:10,b:28,l:0};
  const w=W-pad.l-pad.r,h=H-pad.t-pad.b;
  const n=chartData.length,range=mx-mn||1;
  const xOf=i=>pad.l+(i/(n-1))*w;
  const yOf=v=>pad.t+h-(((v-mn)/range)*h);
  const color=isUp?'48,209,88':'255,69,58';
  const gr=ctx.createLinearGradient(0,pad.t,0,pad.t+h);
  gr.addColorStop(0,`rgba(${color},0.22)`);
  gr.addColorStop(1,`rgba(${color},0)`);
  ctx.beginPath();
  ctx.moveTo(xOf(0),yOf(chartData[0].v));
  for(let i=1;i<n;i++){const cpx=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(cpx,yOf(chartData[i-1].v),cpx,yOf(chartData[i].v),xOf(i),yOf(chartData[i].v))}
  ctx.lineTo(xOf(n-1),H-pad.b);ctx.lineTo(xOf(0),H-pad.b);ctx.closePath();
  ctx.fillStyle=gr;ctx.fill();
  ctx.beginPath();
  ctx.moveTo(xOf(0),yOf(chartData[0].v));
  for(let i=1;i<n;i++){const cpx=(xOf(i-1)+xOf(i))/2;ctx.bezierCurveTo(cpx,yOf(chartData[i-1].v),cpx,yOf(chartData[i].v),xOf(i),yOf(chartData[i].v))}
  ctx.strokeStyle=`rgba(${color},1)`;ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.font='500 10px Inter,-apple-system,sans-serif';
  ctx.textAlign='center';
  [0,1,2,3].forEach(i=>{
    const idx=Math.round(i*(n-1)/3);
    const d=new Date(chartData[idx].t);
    const lbl=chartDays==='1'?d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}):chartDays==='7'?d.toLocaleDateString('cs-CZ',{weekday:'short'}):chartDays==='30'?d.toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric'}):d.toLocaleDateString('cs-CZ',{month:'short',year:'2-digit'});
    ctx.fillText(lbl,xOf(idx),H-pad.b+14);
  });
  setupTooltip(canvas,pad,w,xOf,yOf,n);
}

function setupTooltip(canvas,pad,w,xOf,yOf,n){
  const tip=$('tooltip');
  function show(cx){
    const rect=canvas.getBoundingClientRect();
    const x=cx-rect.left;
    const idx=Math.max(0,Math.min(n-1,Math.round(((x-pad.l)/w)*(n-1))));
    const pt=chartData[idx];if(!pt)return;
    const sym=chartMode==='czk'?' Kč':'',pre=chartMode==='usd'?'$':'';
    tip.textContent=pre+fmt(pt.v)+sym;
    tip.style.display='block';tip.style.left=xOf(idx)+'px';tip.style.top=(yOf(pt.v)-34)+'px';
    $('chartPrice').textContent=pre+fmt(pt.v)+sym;
  }
  function hide(){
    tip.style.display='none';
    const last=chartData[n-1];
    if(last)$('chartPrice').textContent=(chartMode==='usd'?'$':'')+fmt(last.v)+(chartMode==='czk'?' Kč':'');
  }
  canvas.ontouchstart=e=>{e.preventDefault();show(e.touches[0].clientX)};
  canvas.ontouchmove=e=>{e.preventDefault();show(e.touches[0].clientX)};
  canvas.ontouchend=()=>setTimeout(hide,1500);
  canvas.onmousemove=e=>show(e.clientX);
  canvas.onmouseleave=()=>hide();
}

/* ── Start ── */
loadFX().then(()=>connectWS());
// FX refresh každou hodinu
setInterval(loadFX, 3600000);
// Při návratu do appky — reconnect WS
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    loadFX();
    if(!wsReady) connectWS();
  }
});
</script>
