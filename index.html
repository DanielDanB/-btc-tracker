<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BTC"/>
  <meta name="theme-color" content="#000000"/>
  <title>Bitcoin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --st:env(safe-area-inset-top);
      --sb:env(safe-area-inset-bottom);
      --sl:env(safe-area-inset-left);
      --sr:env(safe-area-inset-right);
      --btc:#FF9F0A;
      --green:#30D158;
      --red:#FF453A;
    }

    html{height:-webkit-fill-available}

    body{
      font-family:'Inter',-apple-system,sans-serif;
      min-height:100vh;min-height:-webkit-fill-available;
      display:flex;flex-direction:column;align-items:center;
      padding:calc(var(--st) + 20px) calc(var(--sr) + 18px) calc(var(--sb) + 20px) calc(var(--sl) + 18px);
      -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;
      overflow-x:hidden;position:relative;
      /* iOS 26 gradient background */
      background: radial-gradient(ellipse at 20% 10%, #1a0a2e 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, #0d1f3c 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, #1a1a0a 0%, transparent 60%),
                  #050508;
      color:#fff;
    }

    /* Liquid orbs v pozadí */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite}
    .orb1{width:350px;height:350px;background:radial-gradient(circle,rgba(255,159,10,0.18),transparent 70%);top:-80px;left:-80px;animation-delay:0s}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(10,132,255,0.12),transparent 70%);top:30%;right:-60px;animation-delay:-4s}
    .orb3{width:250px;height:250px;background:radial-gradient(circle,rgba(48,209,88,0.08),transparent 70%);bottom:10%;left:20%;animation-delay:-8s}
    @keyframes drift{
      0%,100%{transform:translate(0,0) scale(1)}
      33%{transform:translate(15px,-20px) scale(1.05)}
      66%{transform:translate(-10px,15px) scale(0.95)}
    }

    .wrap{position:relative;z-index:1;width:100%;max-width:390px;margin:0 auto}

    /* ── Header ── */
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:4px}
    .hdr-l{display:flex;align-items:center;gap:11px}

    /* Liquid glass icon */
    .btc-ball{
      width:48px;height:48px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(255,210,100,0.9), rgba(255,159,10,0.7) 50%, rgba(180,80,0,0.5));
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.3),
        0 0 30px rgba(255,159,10,0.4),
        inset 0 1px 1px rgba(255,255,255,0.5),
        inset 0 -2px 6px rgba(0,0,0,0.3);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:900;color:#fff;
      text-shadow:0 1px 3px rgba(0,0,0,0.4);
      flex-shrink:0;
    }
    .hdr-t h1{font-size:17px;font-weight:700;letter-spacing:-.3px;color:#fff}
    .hdr-t p{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;font-weight:400}

    /* Live pill — liquid glass */
    .pill{
      display:flex;align-items:center;gap:5px;
      font-size:11px;font-weight:600;color:var(--green);letter-spacing:.2px;
      padding:5px 12px;border-radius:99px;
      background:rgba(48,209,88,0.12);
      border:0.5px solid rgba(48,209,88,0.3);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .pill::before{
      content:'';width:5px;height:5px;background:var(--green);
      border-radius:50%;animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── Main liquid glass card ── */
    .glass{
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(40px) saturate(180%);
      -webkit-backdrop-filter:blur(40px) saturate(180%);
      border:0.5px solid rgba(255,255,255,0.15);
      border-radius:28px;
      padding:26px 22px 22px;
      margin-bottom:12px;
      position:relative;overflow:hidden;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.05) inset,
        0 20px 60px rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.1) inset;
    }
    /* Shimmer highlight na vrchu karty */
    .glass::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);
    }
    /* Liquid light reflex */
    .glass::after{
      content:'';position:absolute;top:-60px;left:-60px;
      width:200px;height:200px;border-radius:50%;
      background:radial-gradient(circle,rgba(255,255,255,0.04),transparent 70%);
      pointer-events:none;
    }

    .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .clabel{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)}

    /* Cena USD — velká */
    .usd-row{margin-bottom:6px}
    .usd-price{
      font-size:54px;font-weight:800;letter-spacing:-3px;line-height:1;
      color:#fff;display:flex;align-items:baseline;gap:4px;
    }
    .usd-sym{font-size:26px;font-weight:400;color:rgba(255,255,255,.5);letter-spacing:0}

    /* CZK blok — menší glass */
    .czk-glass{
      background:rgba(255,255,255,0.05);
      border:0.5px solid rgba(255,255,255,0.1);
      border-radius:16px;padding:12px 16px;
      display:flex;justify-content:space-between;align-items:center;
      margin-top:14px;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .czk-l{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .czk-v{font-size:22px;font-weight:700;color:#fff;display:flex;align-items:baseline;gap:4px}
    .czk-s{font-size:13px;font-weight:400;color:rgba(255,255,255,.4)}

    /* Badge změny */
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:13px;font-weight:600;padding:6px 14px;border-radius:99px;
      margin-top:14px;transition:all .3s;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .badge.up{
      background:rgba(48,209,88,0.12);color:var(--green);
      border:0.5px solid rgba(48,209,88,0.25);
    }
    .badge.dn{
      background:rgba(255,69,58,0.12);color:var(--red);
      border:0.5px solid rgba(255,69,58,0.25);
    }
    .badge svg{width:12px;height:12px}

    .div{height:0.5px;background:rgba(255,255,255,0.08);margin:18px 0}

    /* Stats */
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat{
      background:rgba(255,255,255,0.04);
      border:0.5px solid rgba(255,255,255,0.08);
      border-radius:16px;padding:13px;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }
    .sl{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px}
    .sv{font-size:15px;font-weight:700;color:#fff}

    /* Refresh button — liquid glass */
    .btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;min-height:54px;padding:14px;
      background:rgba(255,159,10,0.15);
      border:0.5px solid rgba(255,159,10,0.3);
      border-radius:18px;
      color:var(--btc);font-size:15px;font-weight:600;
      cursor:pointer;font-family:inherit;
      -webkit-tap-highlight-color:transparent;touch-action:manipulation;
      backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
      transition:all .15s;
      box-shadow:0 0 20px rgba(255,159,10,0.08),inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn:active{transform:scale(.97);background:rgba(255,159,10,0.25)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn.loading svg{animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .err{
      display:none;
      background:rgba(255,69,58,0.1);
      border:0.5px solid rgba(255,69,58,0.2);
      border-radius:12px;padding:11px 14px;
      font-size:13px;color:var(--red);
      margin-top:10px;text-align:center;
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    }

    .ts{text-align:center;font-size:11px;color:rgba(255,255,255,.25);margin-top:12px;font-weight:400}
    .src{text-align:center;font-size:10px;color:rgba(255,255,255,.2);margin-top:3px;letter-spacing:.3px}

    /* Skeleton */
    .sk{
      background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);
      background-size:200% 100%;animation:sh 1.4s ease-in-out infinite;
      border-radius:10px;color:transparent!important;user-select:none;display:inline-block;
    }
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>

<!-- Liquid orbs -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrap">

  <div class="hdr">
    <div class="hdr-l">
      <div class="btc-ball">₿</div>
      <div class="hdr-t">
        <h1>Bitcoin</h1>
        <p>Aktuální cena</p>
      </div>
    </div>
    <div class="pill">Živě</div>
  </div>

  <div class="glass">
    <div class="top-row">
      <div class="clabel">Cena</div>
    </div>

    <div class="usd-row">
      <div class="clabel" style="margin-bottom:6px">USD</div>
      <div class="usd-price">
        <span class="usd-sym">$</span>
        <span id="usd" class="sk" style="width:220px;height:52px"> </span>
      </div>
    </div>

    <div class="czk-glass">
      <span class="czk-l">CZK</span>
      <div class="czk-v">
        <span id="czk" class="sk" style="width:150px;height:24px"> </span>
        <span class="czk-s">Kč</span>
      </div>
    </div>

    <div id="badge" class="badge up sk" style="width:140px;height:32px"> </div>

    <div class="div"></div>

    <div class="stats">
      <div class="stat"><div class="sl">24H HIGH</div><div class="sv" id="s1">…</div></div>
      <div class="stat"><div class="sl">24H LOW</div><div class="sv" id="s2">…</div></div>
      <div class="stat"><div class="sl">TRŽNÍ CAP</div><div class="sv" id="s3">…</div></div>
      <div class="stat"><div class="sl">OBJEM 24H</div><div class="sv" id="s4">…</div></div>
    </div>
  </div>

  <div class="err" id="err"></div>

  <button class="btn" id="btn" onclick="go()">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
    </svg>
    Obnovit cenu
  </button>

  <div class="ts" id="ts">Načítám data…</div>
  <div class="src" id="src"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const fmt=(n,d=0)=>new Intl.NumberFormat('cs-CZ',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const fmtB=n=>n>=1e12?(n/1e12).toFixed(2)+' bil.':n>=1e9?(n/1e9).toFixed(2)+' mld.':n>=1e6?(n/1e6).toFixed(1)+' mil.':fmt(n);
const pct=n=>(n>=0?'+':'')+parseFloat(n).toFixed(2)+'%';
// corsproxy.io — ověřeno že funguje s CoinGecko na iOS
const P=u=>'https://corsproxy.io/?url='+encodeURIComponent(u);

async function go(){
  const btn=$('btn'),err=$('err');
  if(btn.disabled)return;
  btn.disabled=true;btn.classList.add('loading');
  err.style.display='none';

  try{
    // Paralelně: BTC data + CZK kurz
    const [r1,r2]=await Promise.all([
      fetch(P('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=bitcoin&sparkline=false')),
      fetch(P('https://api.frankfurter.app/latest?from=USD&to=CZK'))
    ]);

    if(!r1.ok||!r2.ok) throw new Error('HTTP '+r1.status);

    const coins=await r1.json();
    const fx=await r2.json();

    const b=coins[0];
    const usd=b.current_price;
    const czk=usd*fx.rates.CZK;
    const ch=b.price_change_percentage_24h;

    // Render — odstranit skeleton
    const uel=$('usd'),cel=$('czk'),bad=$('badge');
    uel.className='';uel.style='';uel.textContent=fmt(usd);
    cel.className='';cel.style='';cel.textContent=fmt(czk);

    bad.className='badge '+(ch>=0?'up':'dn');
    bad.style='';
    bad.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="${ch>=0?'M5 15l7-7 7 7':'M19 9l-7 7-7-7'}"/></svg>${pct(ch)} za 24h`;

    $('s1').textContent='$'+fmt(b.high_24h);
    $('s2').textContent='$'+fmt(b.low_24h);
    $('s3').textContent='$'+fmtB(b.market_cap);
    $('s4').textContent='$'+fmtB(b.total_volume);

    const now=new Date();
    $('ts').textContent='Aktualizováno: '+now.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    $('src').textContent='via CoinGecko';

  }catch(e){
    err.textContent='⚠ Nepodařilo se načíst data. Zkuste Obnovit.';
    err.style.display='block';
    $('ts').textContent='Chyba: '+e.message;
    console.error(e);
  }finally{
    btn.disabled=false;btn.classList.remove('loading');
  }
}

go();
setInterval(go,90000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')go();});
</script>
</body>
</html>
