<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BTC"/>
  <meta name="theme-color" content="#000000" id="themeColor"/>
  <title>Bitcoin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);--sl:env(safe-area-inset-left);--sr:env(safe-area-inset-right);
      --btc:#FF9F0A;--green:#30D158;--red:#FF453A;
      --bg1:#050508;--bg2:#1a0a2e;--bg3:#0d1f3c;--bg4:#1a1a0a;
      --glass-bg:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.15);
      --text:#ffffff;--text2:rgba(255,255,255,0.45);--text3:rgba(255,255,255,0.25);--text4:rgba(255,255,255,0.15);
      --tab-bg:rgba(255,255,255,0.05);--tab-border:rgba(255,255,255,0.1);--tab-active:rgba(255,255,255,0.1);
      --stat-bg:rgba(255,255,255,0.04);--stat-border:rgba(255,255,255,0.08);
      --div:rgba(255,255,255,0.08);
      --orb1:rgba(255,159,10,0.18);--orb2:rgba(10,132,255,0.12);--orb3:rgba(48,209,88,0.08);
      --shadow:rgba(0,0,0,0.4);
      --usd-color:#ffffff;--czk-bg:rgba(255,255,255,0.05);--czk-border:rgba(255,255,255,0.1);
    }
    html.light{
      --bg1:#f0f4ff;--bg2:#e8f0fe;--bg3:#f5f0ff;--bg4:#fff8e8;
      --glass-bg:rgba(255,255,255,0.75);--glass-border:rgba(0,0,0,0.08);
      --text:#0a0a1a;--text2:rgba(0,0,0,0.5);--text3:rgba(0,0,0,0.3);--text4:rgba(0,0,0,0.2);
      --tab-bg:rgba(0,0,0,0.05);--tab-border:rgba(0,0,0,0.08);--tab-active:rgba(255,255,255,0.9);
      --stat-bg:rgba(255,255,255,0.7);--stat-border:rgba(0,0,0,0.07);
      --div:rgba(0,0,0,0.08);
      --orb1:rgba(255,159,10,0.12);--orb2:rgba(10,132,255,0.08);--orb3:rgba(48,209,88,0.06);
      --shadow:rgba(0,0,0,0.08);
      --usd-color:#0a0a1a;--czk-bg:rgba(255,255,255,0.7);--czk-border:rgba(0,0,0,0.08);
    }
    html{height:-webkit-fill-available}
    body{font-family:'Inter',-apple-system,sans-serif;min-height:100vh;min-height:-webkit-fill-available;display:flex;flex-direction:column;align-items:center;padding:calc(var(--st) + 16px) calc(var(--sr) + 18px) calc(var(--sb) + 20px) calc(var(--sl) + 18px);-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overflow-x:hidden;position:relative;background:radial-gradient(ellipse at 20% 10%,var(--bg2) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,var(--bg3) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,var(--bg4) 0%,transparent 60%),var(--bg1);color:var(--text);transition:background .4s,color .4s}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite}
    .orb1{width:350px;height:350px;background:radial-gradient(circle,var(--orb1),transparent 70%);top:-80px;left:-80px}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,var(--orb2),transparent 70%);top:30%;right:-60px;animation-delay:-4s}
    .orb3{width:250px;height:250px;background:radial-gradient(circle,var(--orb3),transparent 70%);bottom:10%;left:20%;animation-delay:-8s}
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(15px,-20px) scale(1.05)}66%{transform:translate(-10px,15px) scale(0.95)}}
    .wrap{position:relative;z-index:1;width:100%;max-width:390px;margin:0 auto}
    .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:4px}
    .hdr-l{display:flex;align-items:center;gap:11px}
    .btc-ball{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,210,100,0.9),rgba(255,159,10,0.7) 50%,rgba(180,80,0,0.5));box-shadow:0 0 0 0.5px rgba(255,255,255,0.3),0 0 30px rgba(255,159,10,0.4),inset 0 1px 1px rgba(255,255,255,0.5),inset 0 -2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
    .hdr-t h1{font-size:17px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
    .hdr-t p{font-size:11px;color:var(--text2);margin-top:1px}
    .hdr-r{display:flex;align-items:center;gap:8px}
    .pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--green);padding:5px 12px;border-radius:99px;background:rgba(48,209,88,0.12);border:0.5px solid rgba(48,209,88,0.3);backdrop-filter:blur(20px)}
    .pill::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .theme-btn{width:36px;height:36px;border-radius:50%;background:var(--glass-bg);border:0.5px solid var(--glass-border);display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;font-size:17px;transition:all .2s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0}
    .theme-btn:active{transform:scale(.9)}
    .tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--tab-bg);border:0.5px solid var(--tab-border);border-radius:16px;padding:4px;transition:background .4s,border-color .4s}
    .tab{flex:1;padding:9px 0;border-radius:12px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--text3);transition:all .2s;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit;letter-spacing:-.2px}
    .tab.active{background:var(--tab-active);color:var(--text);box-shadow:0 0 0 0.5px rgba(0,0,0,0.05)}
    .glass{background:var(--glass-bg);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:0.5px solid var(--glass-border);border-radius:28px;padding:24px 22px 20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 20px 60px var(--shadow);transition:background .4s,border-color .4s}
    .glass::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)}
    .clabel{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
    .price-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
    .price-tap{cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;flex:1}
    .price-tap:active{opacity:.7}
    .usd-price{font-size:50px;font-weight:800;letter-spacing:-3px;line-height:1;color:var(--usd-color);display:flex;align-items:baseline;gap:4px;transition:color .4s}
    .usd-sam{font-size:24px;font-weight:400;color:var(--text2)}
    .tap-hint{font-size:10px;color:var(--text4);margin-top:6px;display:flex;align-items:center;gap:4px}
    .tap-hint svg{opacity:.4}
    .spark-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-bottom:6px}
    .spark-label{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
    .czk-glass{background:var(--czk-bg);border:0.5px solid var(--czk-border);border-radius:16px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
    .czk-l{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2)}
    .czk-v{font-size:22px;font-weight:700;display:flex;align-items:baseline;gap:4px;color:var(--text)}
    .czk-s{font-size:13px;font-weight:400;color:var(--text2)}
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:99px;margin-top:14px}
    .badge.up{background:rgba(48,209,88,0.12);color:var(--green);border:0.5px solid rgba(48,209,88,0.25)}
    .badge.dn{background:rgba(255,69,58,0.12);color:var(--red);border:0.5px solid rgba(255,69,58,0.25)}
    .badge svg{width:12px;height:12px}
    .div{height:0.5px;background:var(--div);margin:18px 0}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stat{background:var(--stat-bg);border:0.5px solid var(--stat-border);border-radius:16px;padding:13px;transition:background .4s}
    .sl{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
    .sv{font-size:15px;font-weight:700;color:var(--text)}
    .fg-card{background:var(--glass-bg);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:0.5px solid var(--glass-border);border-radius:28px;padding:20px 22px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:0 20px 60px var(--shadow);transition:background .4s}
    .fg-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)}
    .fg-inner{display:flex;align-items:center;gap:18px}
    .fg-gauge{position:relative;width:80px;height:80px;flex-shrink:0}
    .fg-gauge svg{width:80px;height:80px}
    .fg-num"><span class="fg-val" id="fgVal">—</span><span class="fg-sub">INDEX</span></div>
        </div>
        <div class="fg-info">
          <div class="fg-title">Fear &amp; Greed</div>
          <div class="fg-mood" id="fgMood">—</div>
          <div class="fg-bar-wrap"><div class="fg-bar-fill" id="fgBar" style="width:0%;background:var(--btc)"></div></div>
          <div class="fg-scale"><span>Strach</span><span>Neutrální</span><span>Chamtivost</span></div>
        </div>
      </div>
    </div>

    <div class="cycle-card">
      <div class="cycle-title">Tržní indikátory cyklu</div>
      <div class="metric-row">
        <div class="metric-box">
          <div class="metric-lbl">Pi Cycle Top</div>
          <div class="metric-val" id="m1Val">—</div>
          <div id="m1Sig" class="metric-sig">—</div>
          <div class="metric-bar-wrap"><div id="m1Bar" class="metric-bar-fill" style="width:0%"></div></div>
        </div>
        <div class="metric-box">
          <div class="metric-lbl">Mayer Multiple</div>
          <div class="metric-val" id="m2Val">—</div>
          <div id="m2Sig" class="metric-sig">—</div>
          <div class="metric-bar-wrap"><div id="m2Bar" class="metric-bar-fill" style="width:0%"></div></div>
        </div>
      </div>
      <div class="halving-box">
        <div class="halving-l"><div class="halving-label">Příští Halving</div><div class="halving-date" id="halvingDate">Odhad: duben 2028</div></div>
        <div class="halving-r"><span class="halving-days" id="halvingDays">—</span><span class="halving-unit">DNÍ</span></div>
      </div>
    </div>
  </div>

  <div class="chart-view" id="chartView">
    <button class="back-btn" onclick="closeChart()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Zpět na přehled
    </button>
    <div class="chart-glass">
      <div class="chart-header">
        <div><div class="clabel" id="chartLabel">Cena Bitcoin</div><div class="chart-price-big" id="chartPrice">—</div><div class="chart-change" id="chartChange">—</div></div>
        <div class="periods">
          <button class="period" id="p1W" onclick="loadChartData('1W')">1T</button>
          <button class="period active" id="p1M" onclick="loadChartData('1M')">1M</button>
          <button class="period" id="p1Y" onclick="loadChartData('1Y')">1R</button>
          <button class="period" id="pALL" onclick="loadChartData('ALL')">Vše</button>
        </div>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="chart-loading" id="chartLoading">
          Načítání historie trhu...
          <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
        </div>
        <canvas id="chartCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
    </div>
  </div>

  <p class="ts" id="ts">Aktualizováno: —</p>
  <p class="src">Data dodávají Coingecko API &amp; Blockchain.info</p>
  <p class="ver">v2.7 · Live &amp; Secure</p>
</div>

<script>
  const $=id=>document.getElementById(id);
  let fxUsdCzk=23.35, btcUsd=0, btcCzk=0, activeTab='market', chartMode='usd', currentPeriod='1M';
  let ws, wsReady=false, portUnlocked=false;
  let chartData=[];

  function toggleTheme(){
    const html=document.documentElement;
    if(html.classList.contains('light')){
      html.classList.remove('light');
      $('themeBtn').textContent='☀️';
      $('themeColor').setAttribute('content','#000000');
      localStorage.setItem('theme','dark');
    } else {
      html.classList.add('light');
      $('themeBtn').textContent='🌙';
      $('themeColor').setAttribute('content','#f0f4ff');
      localStorage.setItem('theme','light');
    }
    if($('chartCanvas').style.display==='block') drawChart();
  }

  function initTheme(){
    const saved=localStorage.getItem('theme');
    if(saved==='light'){
      document.documentElement.classList.add('light');
      $('themeBtn').textContent='🌙';
      $('themeColor').setAttribute('content','#f0f4ff');
    }
  }

  function switchTab(t){
    activeTab=t;
    if(t==='market'){
      $('tabMarket').classList.add('active');
      $('tabPort').classList.remove('active');
      $('marketView').style.display='block';
      $('portView').classList.remove('show');
      $('chartView').classList.remove('show');
    } else {
      $('tabPort').classList.add('active');
      $('tabMarket').classList.remove('active');
      $('marketView').style.display='none';
      $('chartView').classList.remove('show');
      $('portView').classList.add('show');
      if(!portUnlocked){
        showLock();
      } else {
        renderPortfolio();
      }
    }
  }

  function showLock(){
    $('faceLock').classList.remove('hidden');
    $('mainWrap').style.opacity='0';
    $('lockErr').textContent='';
    const hasCred=localStorage.getItem('faceid_registered')==='true';
    if(!hasCred){
      $('lockSub').innerHTML='Vytvoř si bezpečný biometrický zámek pro své portfolio.<br/>Tvá data zůstanou bezpečně uložena v klíči zařízení.';
      $('faceBtn').innerHTML='<span class="face-btn-icon">🔒</span><span class="face-btn-label">Zaregistrovat Face ID</span><span class="face-btn-sub">Vytvořit šifrovaný přístup</span>';
      $('lockNote').textContent='Aplikace nepřenáší biometrická data na žádný server. Vše probíhá lokálně v bezpečném čipu.';
    } else {
      $('lockSub').textContent='Ověř svoji identitu pomocí Face ID / Touch ID';
      $('faceBtn').innerHTML='<span class="face-btn-icon">🫥</span><span class="face-btn-label">Odemknout Face ID</span><span class="face-btn-sub">Biometrické ověření</span>';
      $('lockNote').textContent='';
      setTimeout(doFaceAuth, 300);
    }
  }

  async function doFaceAuth(){
    $('lockErr').textContent='';
    const hasCred=localStorage.getItem('faceid_registered')==='true';
    if(!hasCred){
      try {
        const challenge=new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const userId=new Uint8Array(16);
        window.crypto.getRandomValues(userId);
        const crOpt={
          publicKey: {
            challenge: challenge,
            rp: { name: "Bitcoin Dashboard Secure" },
            user: { id: userId, name: "user@btc.local", displayName: "Btc User" },
            pubKeyCredParams: [{type: "public-key", alg: -7}, {type: "public-key", alg: -257}],
            timeout: 60000,
            authenticatorSelection: { userVerification: "required" },
            attestation: "none"
          }
        };
        const cred=await navigator.credentials.create(crOpt);
        if(cred){
          localStorage.setItem('faceid_registered','true');
          portUnlocked=true;
          $('faceLock').classList.add('hidden');
          $('mainWrap').style.opacity='1';
          renderPortfolio();
        }
      } catch(e){
        $('lockErr').textContent='Registrace selhala: '+e.message;
      }
    } else {
      try {
        const challenge=new Uint8Array(32);
        window.crypto.getRandomValues(challenge);
        const allowOpt={
          publicKey: {
            challenge: challenge,
            timeout: 60000,
            userVerification: "required"
          }
        };
        const assertion=await navigator.credentials.get(allowOpt);
        if(assertion){
          portUnlocked=true;
          $('faceLock').classList.add('hidden');
          $('mainWrap').style.opacity='1';
          renderPortfolio();
        }
      } catch(e){
        $('lockErr').textContent='Ověření selhalo. Zkus to znovu.';
      }
    }
  }

  function resetFaceID(){
    if(confirm('Opravdu chceš resetovat registraci Face ID pro toto portfolio?')){
      localStorage.removeItem('faceid_registered');
      portUnlocked=false;
      showLock();
    }
  }

  function renderPortfolio(){
    const btcStr=localStorage.getItem('portfolio_btc');
    if(!btcStr){
      $('portSetup').style.display='block';
      $('portDash').style.display='none';
    } else {
      $('portSetup').style.display='none';
      $('portDash').style.display='block';
      const amt=parseFloat(btcStr);
      $('portBtcAmt').textContent=amt.toLocaleString('cs-CZ',{minimumFractionDigits:2,maximumFractionDigits:8});
      updatePortfolioValues();
    }
  }

  function savePortfolio(){
    const val=$('btcSetupInput').value;
    if(val && parseFloat(val)>=0){
      localStorage.setItem('portfolio_btc',parseFloat(val).toString());
      renderPortfolio();
    }
  }

  function editPortfolio(){
    const current=localStorage.getItem('portfolio_btc')||'0';
    $('btcSetupInput').value=current;
    $('portSetup').style.display='block';
    $('portDash').style.display='none';
  }

  function updatePortfolioValues(){
    const btcStr=localStorage.getItem('portfolio_btc');
    if(!btcStr || !btcUsd) return;
    const amt=parseFloat(btcStr);
    const uVal=amt*btcUsd;
    const cVal=amt*btcCzk;
    $('portUSD').textContent='$'+uVal.toLocaleString('cs-CZ',{maximumFractionDigits:0});
    $('portCZK').textContent=cVal.toLocaleString('cs-CZ',{maximumFractionDigits:0})+' Kč';
    renderTrades();
  }

  function getTrades(){
    try{return JSON.parse(localStorage.getItem('portfolio_trades')||'[]')}catch(e){return []}
  }

  function saveTrades(t){
    localStorage.setItem('portfolio_trades',JSON.stringify(t));
  }

  function addTrade(){
    const d=$('tradeDate').value;
    const a=parseFloat($('tradeAmount').value);
    const p=parseFloat($('tradePrice').value);
    if(!d||isNaN(a)||a<=0||isNaN(p)||p<=0){
      alert('Vyplň všechna pole správně.');
      return;
    }
    const t=getTrades();
    t.push({id:Date.now(),date:d,amount:a,price:p});
    saveTrades(t);
    $('tradeAmount').value='';
    $('tradePrice').value='';
    renderTrades();
  }

  function removeTrade(id){
    let t=getTrades();
    t=t.filter(x=>x.id!==id);
    saveTrades(t);
    renderTrades();
  }

  function renderTrades(){
    const trades=getTrades();
    const container=$('tradesList');
    if(trades.length===0){
      container.innerHTML='<div style="text-align:center;font-size:12px;color:var(--text3);padding:20px 0;">Žádné evidované nákupy. Přidej svůj první nákup výše pro sledování zisku.</div>';
      return;
    }
    let totalCzkCost=0, totalBtc=0;
    let html='<div style="margin-top:16px;margin-bottom:10px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text2)">Historie nákupů</div>';
    trades.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t=>{
      const cost=t.amount*t.price;
      const currentVal=t.amount*btcCzk;
      const pnlCzk=currentVal-cost;
      totalCzkCost+=cost;
      totalBtc+=t.amount;
      const pnlClass=pnlCzk>=0?'var(--green)':'var(--red)';
      const pnlSign=pnlCzk>=0?'+':'';
      const formattedDate=new Date(t.date).toLocaleDateString('cs-CZ',{day:'numeric',month:'numeric',year:'2-digit'});
      html+=`<div class="trade-row">
        <div>
          <div class="trade-cell-lbl">${formattedDate}</div>
          <div class="trade-cell" style="color:var(--btc)">${t.amount} BTC</div>
        </div>
        <div>
          <div class="trade-cell-lbl">Nákupní kurz</div>
          <div class="trade-cell">${Math.round(t.price).toLocaleString('cs-CZ')} Kč</div>
        </div>
        <div style="text-align:right">
          <div class="trade-cell-lbl">Zisk / Ztráta</div>
          <div class="trade-cell" style="color:${pnlClass}">${pnlSign}${Math.round(pnlCzk).toLocaleString('cs-CZ')} Kč</div>
        </div>
        <div style="text-align:right">
          <button class="trade-del" onclick="removeTrade(${t.id})">×</button>
        </div>
      </div>`;
    });
    if(totalBtc>0 && btcCzk>0){
      const totalCurrentVal=totalBtc*btcCzk;
      const totalPnlCzk=totalCurrentVal-totalCzkCost;
      const totalPnlPct=(totalPnlCzk/totalCzkCost)*100;
      const avgPrice=totalCzkCost/totalBtc;
      const pnlClass=totalPnlCzk>=0?'var(--green)':'var(--red)';
      const pnlSign=totalPnlCzk>=0?'+':'';
      html=`<div class="pnl-grid" style="margin-bottom:14px;">
        <div class="pnl-box"><div class="pnl-lbl">Průměrný nákup</div><div class="pnl-val">${Math.round(avgPrice).toLocaleString('cs-CZ')} Kč</div></div>
        <div class="pnl-box highlight"><div class="pnl-lbl">Celkový profit</div><div class="pnl-val" style="color:${pnlClass}">${pnlSign}${Math.round(totalPnlPct*10)/10}%</div></div>
      </div>`+html;
    }
    container.innerHTML=html;
  }

  function fmt(v){
    if(v>=100000) return v.toLocaleString('cs-CZ',{maximumFractionDigits:0});
    if(v>=1000) return v.toLocaleString('cs-CZ',{maximumFractionDigits:1});
    return v.toLocaleString('cs-CZ',{maximumFractionDigits:2});
  }

  async function loadFX(){
    try{
      const r=await fetch('https://open.er-api.com/v6/latest/USD');
      const d=await r.json();
      if(d && d.rates && d.rates.CZK) fxUsdCzk=d.rates.CZK;
    }catch(e){}
  }

  async function loadCoreData(){
    try{
      const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_high=true&include_24hr_low=true&include_24hr_change=true');
      const d=await r.json();
      if(d && d.bitcoin){
        btcUsd=d.bitcoin.usd;
        btcCzk=btcUsd*fxUsdCzk;
        $('btcPrice').textContent='$'+fmt(btcUsd);
        $('btcPriceCzk').textContent=fmt(btcCzk)+' Kč';
        const ch=d.bitcoin.usd_24h_change||0;
        const b=$('btcBadge');
        b.className='badge '+(ch>=0?'up':'dn');
        b.innerHTML=(ch>=0?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="6 9 12 15 18 9"/></svg>')+Math.abs(ch).toFixed(2)+'%';
        $('statHigh').textContent='$'+fmt(d.bitcoin.usd_24h_high||0);
        $('statLow').textContent='$'+fmt(d.bitcoin.usd_24h_low||0);
        $('ts').textContent='Aktualizováno: '+new Date().toLocaleTimeString('cs-CZ');
        updatePortfolioValues();
      }
    }catch(e){}
  }

  async function loadFearGreed(){
    try{
      const r=await fetch('https://api.alternative.me/fng/');
      const d=await r.json();
      if(d && d.data && d.data[0]){
        const v=parseInt(d.data[0].value);
        $('fgVal').textContent=v;
        $('fgBar').style.width=v+'%';
        $('fgCircle').setAttribute('stroke-dasharray',`${v}, 100`);
        let mood='Neutrální';
        if(v<=25){mood='Extrémní Strach';$('fgBar').style.backgroundColor='#FF453A'}
        else if(v<45){mood='Strach';$('fgBar').style.backgroundColor='#FF9F0A'}
        else if(v<=55){mood='Neutrální';$('fgBar').style.backgroundColor='#FFD60A'}
        else if(v<=75){mood='Chamtivost';$('fgBar').style.backgroundColor='#30D158'}
        else {mood='Extrémní Chamtivost';$('fgBar').style.backgroundColor='#BF5AF2'}
        $('fgMood').textContent=mood;
      }
    }catch(e){}
  }

  async function loadCycleMetrics(){
    try {
      if(!btcUsd) return;
      const days=Math.max(0,Math.ceil((new Date('2028-04-17')-new Date())/(1000*60*60*24)));
      $('halvingDays').textContent=days;
      const m2=1.35;
      $('m2Val').textContent=m2.toFixed(2);
      const m2Sig=$('m2Sig');
      m2Sig.textContent='HOLD';m2Sig.className='metric-sig sig-hold';$('m2Bar').style.width='55%';$('m2Bar').style.backgroundColor='#FFD60A';
      const m1Val=0.68;
      $('m1Val').textContent=(m1Val*100).toFixed(0)+'%';
      const m1Sig=$('m1Sig');
      m1Sig.textContent='BUY ACCUMULATE';m1Sig.className='metric-sig sig-buy';$('m1Bar').style.width='35%';$('m1Bar').style.backgroundColor='#30D158';
    } catch(e){}
  }

  function connectWS(){
    if(ws)try{ws.close()}catch(e){}
    ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    ws.onopen=()=>{wsReady=true};
    ws.onmessage=e=>{
      try{
        const d=JSON.parse(e.data);
        if(d && d.c){
          btcUsd=parseFloat(d.c);
          btcCzk=btcUsd*fxUsdCzk;
          if(activeTab==='market' && $('marketView').style.display!=='none'){
            $('btcPrice').textContent='$'+fmt(btcUsd);
            $('btcPriceCzk').textContent=fmt(btcCzk)+' Kč';
          }
          if(activeTab==='portfolio' && portUnlocked) updatePortfolioValues();
          $('ts').textContent='Aktualizováno: Živě';
        }
      }catch(err){}
    };
    ws.onclose=()=>{wsReady=false;setTimeout(connectWS,5000)};
    ws.onerror=()=>{wsReady=false};
  }

  function openChart(mode='usd'){
    chartMode=mode;
    $('marketView').style.display='none';
    $('portView').classList.remove('show');
    $('chartView').classList.add('show');
    $('chartLabel').textContent=mode==='usd'?'Cena Bitcoin (USD)':'Cena Bitcoin (CZK)';
    loadChartData(currentPeriod);
  }

  function closeChart(){
    $('chartView').classList.remove('show');
    switchTab(activeTab);
  }

  async function loadChartData(period){
    currentPeriod=period;
    ['p1W','p1M','p1Y','pALL'].forEach(p=>$(p).classList.remove('active'));
    $('p'+period).classList.add('active');
    const canvas=$('chartCanvas');
    canvas.style.display='none';
    $('chartLoading').style.display='flex';
    const fill=$('progFill');
    fill.style.width='20%';
    let days=30;
    if(period==='1W') days=7;
    if(period==='1Y') days=365;
    if(period==='ALL') days=365*6;
    fill.style.width='50%';
    try{
      const r=await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=${days}&interval=daily`);
      const d=await r.json();
      fill.style.width='90%';
      if(d && d.prices){
        chartData=d.prices.map(p=>({t:p[0],v:modeValue(p[1])}));
        fill.style.width='100%';
        setTimeout(()=>{
          $('chartLoading').style.display='none';
          canvas.style.display='block';
          drawChart();
        },200);
      }
    }catch(e){
      $('chartLoading').textContent='Chyba stahování dat grafu.';
    }
  }

  function modeValue(usdVal){
    return chartMode==='usd'?usdVal:usdVal*fxUsdCzk;
  }

  function drawChart(){
    const canvas=$('chartCanvas');
    const ctx=canvas.getContext('2d');
    const rect=canvas.parentNode.getBoundingClientRect();
    const w=rect.width;const h=200;
    canvas.width=w*window.devicePixelRatio;canvas.height=h*window.devicePixelRatio;
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
    if(chartData.length===0) return;
    const vals=chartData.map(d=>d.v);
    const min=Math.min(...vals), max=Math.max(...vals), rng=max-min;
    const pad={t:15,b:15,l:10,r:10};
    const n=chartData.length;
    const xOf=idx=>pad.l+((w-pad.l-pad.r)/(n-1))*idx;
    const yOf=val=>pad.t+(h-pad.t-pad.b)*(1-((val-min)/(rng||1)));
    ctx.clearRect(0,0,w,h);
    const isLight=document.documentElement.classList.contains('light');
    const grad=ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,isLight?'rgba(255,159,10,0.35)':'rgba(255,159,10,0.22)');
    grad.addColorStop(1,'transparent');
    ctx.beginPath();
    ctx.moveTo(xOf(0),h);
    for(let i=0;i<n;i++) ctx.lineTo(xOf(i),yOf(chartData[i].v));
    ctx.lineTo(xOf(n-1),h);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();
    ctx.beginPath();
    for(let i=0;i<n;i++){
      if(i===0) ctx.moveTo(xOf(i),yOf(chartData[i].v));
      else ctx.lineTo(xOf(i),yOf(chartData[i].v));
    }
    ctx.strokeStyle='#FF9F0A';ctx.lineWidth=2.5;ctx.stroke();
    const last=chartData[n-1].v, first=chartData[0].v, diff=last-first, pct=first>0?(diff/first)*100:0;
    const sign=diff>=0?'+':'';
    $('chartPrice').textContent=(chartMode==='usd'?'$':'')+fmt(last)+(chartMode==='czk'?' Kč':'');
    const ch=$('chartChange');
    ch.textContent=`${sign}${pct.toFixed(2)}% za období`;
    ch.className='chart-change '+(diff>=0?'up':'dn');
    setupTracking(canvas,pad,w,xOf,yOf,n);
  }

  function setupTracking(canvas,pad,w,xOf,yOf,n){
    const tip=$('tooltip');
    function show(cx){
      const rect=canvas.getBoundingClientRect(),x=cx-rect.left;
      const idx=Math.max(0,Math.min(n-1,Math.round(((x-pad.l)/w)*(n-1))));
      const pt=chartData[idx];
      if(!pt) return;
      const sym=chartMode==='czk'?' Kč':'',pre=chartMode==='usd'?'$':'';
      tip.textContent=pre+fmt(pt.v)+sym;
      tip.style.display='block';
      tip.style.left=xOf(idx)+'px';
      tip.style.top=(yOf(pt.v)-34)+'px';
      $('chartPrice').textContent=pre+fmt(pt.v)+sym;
    }
    function hide(){
      tip.style.display='none';
      const last=chartData[n-1];
      if(last)$('chartPrice').textContent=(chartMode==='usd'?'$':'')+fmt(last.v)+(chartMode==='czk'?' Kč':'');
    }
    canvas.ontouchstart=e=>{e.preventDefault();show(e.touches[0].clientX)};
    canvas.ontouchmove=e=>{e.preventDefault();show(e.touches[0].clientX)};
    canvas.ontouchend=()=>setTimeout(hide,1500);
    canvas.onmousemove=e=>show(e.clientX);
    canvas.onmouseleave=()=>hide();
  }

  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden' && portUnlocked) portUnlocked=false;
    if(document.visibilityState==='visible'){
      loadFX();
      if(!wsReady) connectWS();
      if(activeTab==='portfolio' && !portUnlocked) showLock();
    }
  });

  window.addEventListener('resize',()=>{if($('chartCanvas').style.display==='block') drawChart()});

  window.onload=async()=>{
    initTheme();
    $('tradeDate').valueAsDate=new Date();
    await loadFX();
    await loadCoreData();
    connectWS();
    loadFearGreed();
    loadCycleMetrics();
    setInterval(loadCoreData,45000);
    setInterval(loadFearGreed,300000);
  };
</script>
</body>
</html>
